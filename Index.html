<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bios Atelier — Public Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Fraunces:ital,wght@1,500;1,600&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF6; --paper-alt:#F1EFE5; --ink:#15151F; --ink-soft:#5B5B68;
    --cyan:#0FC4D6; --magenta:#E8399F; --purple:#7B54FF; --marigold:#FFAE10;
    --card:#FFFFFF; --r:18px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'Work Sans',sans-serif; font-size:16.5px; line-height:1.55; -webkit-font-smoothing:antialiased;}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto;} *{animation-duration:.001ms!important; transition-duration:.001ms!important;} }
  h1,h2,h3{font-family:'Space Grotesk',sans-serif; font-weight:700; line-height:1.06; margin:0; letter-spacing:-0.01em;}
  em{font-family:'Fraunces',serif; font-style:italic; font-weight:600;}
  .c-cyan{color:var(--cyan);} .c-mag{color:var(--magenta);} .c-purp{color:var(--purple);} .c-mar{color:var(--marigold);}
  .mono{font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:.09em;}
  a{color:inherit;} img,svg{display:block; max-width:100%;}
  .wrap{max-width:1180px; margin:0 auto; padding:0 26px;}
  section{padding:96px 0; position:relative;}
  @media (max-width:720px){ section{padding:60px 0;} }

  .blob-bg{overflow:hidden;}
  .blob-bg::before{
    content:""; position:absolute; inset:-15%; z-index:0; pointer-events:none;
    background:
      radial-gradient(36% 30% at 10% 15%, rgba(15,196,214,.30), transparent 70%),
      radial-gradient(32% 28% at 90% 10%, rgba(232,57,159,.26), transparent 70%),
      radial-gradient(38% 32% at 78% 90%, rgba(123,84,255,.24), transparent 70%),
      radial-gradient(26% 22% at 15% 90%, rgba(255,174,16,.24), transparent 70%);
  }
  .blob-bg > *{position:relative; z-index:1;}

  .tag{display:inline-flex; align-items:center; gap:7px; font-size:11.5px; padding:7px 14px; border:2.5px solid var(--ink); border-radius:100px; background:var(--card);}
  .tag.cyan{border-color:var(--cyan); color:#087783;}
  .tag.magenta{border-color:var(--magenta); color:#9c1e6e;}
  .tag.purple{border-color:var(--purple); color:#4f31c9;}
  .tag.marigold{border-color:var(--marigold); color:#a5680a;}

  .card{background:var(--card); border:2.5px solid var(--ink); border-radius:var(--r); box-shadow:6px 7px 0 rgba(21,21,31,0.12);}
  .card.tilt-l{transform:rotate(-1.1deg);}
  .card.tilt-r{transform:rotate(1.1deg);}

  header{position:sticky; top:0; z-index:60; background:rgba(251,250,246,.92); backdrop-filter:blur(8px); border-bottom:2.5px solid var(--ink);}
  nav{display:flex; align-items:center; justify-content:space-between; padding:12px 26px; max-width:1180px; margin:0 auto;}
  .brand{display:flex; align-items:center; gap:10px; text-decoration:none;}
  .brand img{height:46px; width:auto;}
  .brand span{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:22px;}
  .navpill{display:flex; align-items:center; gap:3px; border:2.5px solid var(--ink); border-radius:100px; padding:5px; background:var(--card);}
  .navpill a{text-decoration:none; font-size:13px; font-weight:600; padding:9px 14px; border-radius:100px; color:var(--ink-soft);}
  .navpill a:hover{color:var(--ink); background:var(--paper-alt);}
  .navpill a:focus-visible, .btn:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:2.5px solid var(--purple); outline-offset:2px;}
  .btn{display:inline-flex; align-items:center; gap:8px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; padding:13px 24px; border-radius:100px; border:2.5px solid var(--ink); background:var(--ink); color:var(--paper); text-decoration:none; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; box-shadow:4px 5px 0 rgba(21,21,31,.18);}
  .btn:hover{transform:translate(-2px,-2px); box-shadow:6px 7px 0 rgba(21,21,31,.22);}
  .btn.pink{background:var(--magenta);}
  .btn.ghost{background:var(--card); color:var(--ink);}
  .burger{display:none; background:var(--card); border:2.5px solid var(--ink); border-radius:10px; padding:9px 11px; cursor:pointer;}
  .loc-toggle{display:flex; gap:3px; border:2.5px solid var(--ink); border-radius:100px; padding:4px; background:var(--card);}
  .loc-btn{border:none; background:transparent; padding:8px 13px; border-radius:100px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12px; cursor:pointer; color:var(--ink-soft); white-space:nowrap;}
  .loc-btn.active{background:var(--cyan); color:#fff;}
  @media (max-width:980px){ .loc-toggle{display:none;} }
  @media (max-width:880px){
    .navpill{position:fixed; inset:70px 20px auto 20px; flex-direction:column; align-items:stretch; padding:10px; opacity:0; pointer-events:none; transform:translateY(-8px); transition:opacity .2s, transform .2s;}
    .navpill.open{opacity:1; pointer-events:auto; transform:translateY(0);}
    .navpill a{padding:12px 16px;}
    .burger{display:flex;} .navcta{display:none;}
  }
  @media (min-width:881px){ .navcta{display:inline-flex;} }

  .hero-grid{display:grid; grid-template-columns:1.15fr .85fr; gap:50px; align-items:center; padding-top:16px;}
  @media (max-width:900px){ .hero-grid{grid-template-columns:1fr;} }
  .hero h1{font-size:clamp(36px,5.4vw,62px);}
  .hero p.lede{font-size:18px; color:var(--ink-soft); max-width:48ch; margin:20px 0 30px;}
  .hero-ctas{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:30px;}
  .facts{display:flex; gap:12px; flex-wrap:wrap;}
  .fact-chip{display:flex; align-items:center; gap:9px; border:2.5px solid var(--ink); border-radius:14px; padding:10px 14px; background:var(--card); font-size:13px;}
  .fact-chip b{display:block; font-family:'Space Grotesk',sans-serif; font-size:14.5px;}
  .fact-chip b sup{font-size:9px; margin-left:1px;}
  .fact-chip .mono{font-size:9.5px; color:var(--ink-soft);}

  .logo-card{padding:30px; text-align:center;}
  .logo-card img{max-width:280px; margin:0 auto 14px;}
  .logo-card p{font-size:13px; color:var(--ink-soft); margin:0;}

  .phil-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:40px;}
  @media (max-width:860px){ .phil-grid{grid-template-columns:1fr;} }
  .phil-card{padding:26px 22px;}
  .icon-badge{width:50px; height:50px; border-radius:14px; border:2.5px solid var(--ink); display:flex; align-items:center; justify-content:center; margin-bottom:16px;}
  .phil-card h3{font-size:19px; margin-bottom:10px;}
  .phil-card p{font-size:14.5px; color:var(--ink-soft); margin:0;}

  .topics-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:26px;}
  @media (max-width:760px){ .topics-grid{grid-template-columns:1fr 1fr;} }
  .topic-chip{display:flex; align-items:center; gap:10px; border:2.5px solid var(--ink); border-radius:14px; padding:14px 16px; background:var(--card); font-weight:600; font-size:13.5px;}

  .cycle-shell{display:grid; grid-template-columns:.42fr .58fr; gap:20px; margin-top:36px;}
  @media (max-width:780px){ .cycle-shell{grid-template-columns:1fr;} }
  .week-tab{display:flex; align-items:center; gap:14px; padding:16px 18px; border-radius:14px; border:2.5px solid var(--ink); cursor:pointer; margin-bottom:10px; background:var(--card);}
  .week-tab.active{background:var(--paper-alt); box-shadow:4px 5px 0 rgba(21,21,31,.14);}
  .week-tab .num{width:38px; height:38px; border-radius:10px; border:2.5px solid var(--ink); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-family:'Space Grotesk',sans-serif; font-weight:700;}
  .week-tab strong{display:block; font-size:15px;}
  .week-tab span.sub{font-size:12px; color:var(--ink-soft);}
  .cycle-panel{padding:30px; display:none;}
  .cycle-panel.active{display:block;}
  .cycle-panel .tag{margin-bottom:14px;}
  .cycle-panel h3{font-size:24px; margin-bottom:12px;}
  .cycle-panel p.desc{color:var(--ink-soft); font-size:15px; margin-bottom:22px;}
  .deliv{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  @media (max-width:560px){ .deliv{grid-template-columns:1fr;} }
  .deliv-item{display:flex; gap:10px; align-items:flex-start; background:var(--paper-alt); border-radius:12px; padding:12px 14px; font-size:13.5px;}

  .sample-groups{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:30px;}
  @media (max-width:760px){ .sample-groups{grid-template-columns:1fr;} }
  .group-card{padding:20px;}
  .group-card .mono{font-size:10.5px;}
  .group-card h4{font-size:17.5px; margin:8px 0 8px;}
  .group-card p{margin:0; font-size:13.5px; color:var(--ink-soft);}

  .gallery-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:30px;}
  @media (max-width:760px){ .gallery-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:520px){ .gallery-grid{grid-template-columns:1fr;} }
  .gallery-tile{border-radius:16px; overflow:hidden; border:2.5px solid var(--ink); background:var(--card);}
  .gallery-tile img{width:100%; height:210px; object-fit:cover; display:block;}
  .gallery-placeholder{width:100%; height:210px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:repeating-linear-gradient(135deg, var(--paper-alt) 0 14px, var(--paper) 14px 28px); color:var(--ink-soft); border-bottom:2.5px dashed var(--ink);}
  .gallery-cap{padding:12px 14px;}
  .gallery-cap .mono{font-size:9.5px; color:var(--ink-soft);}
  .gallery-cap h5{font-family:'Space Grotesk',sans-serif; font-size:14.5px; margin:4px 0 0;}

  .sandbox-toggle{display:flex; gap:8px; border:2.5px solid var(--ink); border-radius:100px; padding:5px; background:var(--card); width:fit-content; margin:20px 0 26px;}
  .sandbox-toggle button{border:none; background:transparent; padding:10px 18px; border-radius:100px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px; cursor:pointer; color:var(--ink-soft);}
  .sandbox-toggle button.active{background:var(--magenta); color:#fff;}
  .sandbox-grid{display:grid; grid-template-columns:1fr .5fr; gap:20px;}
  @media (max-width:860px){ .sandbox-grid{grid-template-columns:1fr;} }
  .sandbox-stage{padding:26px; min-height:380px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;}
  .sandbox-side .card{padding:20px; margin-bottom:14px;}
  .stat-row{display:flex; justify-content:space-between; font-size:13px; padding:8px 0; border-top:1px dashed #cfcdbf;}
  .stat-row:first-child{border-top:none;}
  .stat-row b{font-family:'Space Mono',monospace; color:var(--purple);}
  #paintCanvas{border:2.5px solid var(--ink); border-radius:12px; background:#fff; touch-action:none; cursor:crosshair;}
  .palette{display:flex; gap:8px; flex-wrap:wrap;}
  .swatch{width:28px; height:28px; border-radius:50%; border:2.5px solid var(--ink); cursor:pointer;}
  .swatch.selected{outline:3px solid var(--purple); outline-offset:2px;}

  .team-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:30px;}
  @media (max-width:800px){ .team-grid{grid-template-columns:1fr;} }
  .team-card{padding:20px; text-align:left; display:flex; gap:14px; align-items:flex-start;}
  .avatar{width:46px; height:46px; border-radius:50%; border:2.5px solid var(--ink); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .team-card h4{font-size:15.5px; margin:0 0 2px;}
  .team-card .mono{font-size:10px; color:var(--purple); display:block; margin-bottom:8px;}
  .team-card p{font-size:13px; color:var(--ink-soft); margin:0;}

  .sponsor-wrap{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:30px;}
  @media (max-width:800px){ .sponsor-wrap{grid-template-columns:1fr;} }
  .sponsor-wrap .card{padding:28px;}
  input[type=range]{width:100%; accent-color:var(--magenta);}
  .big-num{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:40px; color:var(--magenta);}

  .join-grid{display:grid; grid-template-columns:1fr .8fr; gap:30px; margin-top:30px; align-items:start;}
  @media (max-width:860px){ .join-grid{grid-template-columns:1fr;} }
  form.join-form{padding:28px; display:flex; flex-direction:column; gap:16px;}
  label{font-family:'Space Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-soft); display:block; margin-bottom:6px;}
  input[type=text], input[type=email], select{width:100%; padding:12px 14px; border:2.5px solid var(--ink); border-radius:10px; background:#fff; font-family:'Work Sans',sans-serif; font-size:14.5px; color:var(--ink);}
  .aura-row{display:flex; gap:10px; align-items:center;}
  .form-status{font-size:13.5px; min-height:18px; color:#0a7a55; font-weight:600;}

  .id-card{border:2.5px dashed var(--ink); border-radius:20px; padding:22px; position:relative; background:linear-gradient(135deg,#fff,var(--paper-alt));}
  .id-card::before, .id-card::after{content:""; position:absolute; width:22px; height:22px; background:var(--paper); border:2.5px dashed var(--ink); border-radius:50%; top:50%; transform:translateY(-50%);}
  .id-card::before{left:-13px;} .id-card::after{right:-13px;}
  .id-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;}
  .id-top .mono{font-size:10px;}
  #idDot{width:12px; height:12px; border-radius:50%; border:2.5px solid var(--ink);}
  #idName{font-size:22px; margin:0 0 4px;}
  #idGrade{font-size:12.5px; color:var(--ink-soft); margin:0 0 18px;}
  .id-strip{height:2px; background:repeating-linear-gradient(90deg, var(--ink) 0 8px, transparent 8px 14px); margin-bottom:14px;}
  .id-foot{display:flex; justify-content:space-between; font-size:10px;}

  footer{border-top:2.5px solid var(--ink); padding:44px 0 26px;}
  .foot-grid{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;}
  .foot-brand{display:flex; align-items:center; gap:10px;}
  .foot-brand img{height:30px;}
  .foot-brand span{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px;}
  .fineprint{margin-top:20px; font-size:11.5px; color:var(--ink-soft); font-family:'Space Mono',monospace;}

  .reveal{opacity:0; transform:translateY(14px); transition:opacity .5s ease, transform .5s ease;}
  .reveal.in{opacity:1; transform:translateY(0);}
</style>
</head>
